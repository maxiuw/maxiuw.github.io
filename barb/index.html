<!DOCTYPE html> <html lang="en"> <head> <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"> <meta charset="utf-8"> <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"> <meta http-equiv="X-UA-Compatible" content="IE=edge"> <title>For Barb | Maciej K. Wozniak</title> <meta name="author" content="Maciej K. Wozniak"> <meta name="description" content="Robot perception fails and it is our task to develop the tools that account for that! I am working on developing deep learning models and AR/VR applications for robotics, that account for real-world imperfections, such as missing data, sensor failure, novel domains, and challenging environments. "> <meta name="keywords" content="jekyll, jekyll-theme, academic-website, portfolio-website"> <link rel="stylesheet" href="/assets/css/bootstrap.min.css?a4b3f509e79c54a512b890d73235ef04"> <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mdbootstrap@4.20.0/css/mdb.min.css" integrity="sha256-jpjYvU3G3N6nrrBwXJoVEYI/0zw8htfFnhT9ljN3JJw=" crossorigin="anonymous"> <link defer rel="stylesheet" href="https://unpkg.com/bootstrap-table@1.22.1/dist/bootstrap-table.min.css"> <link rel="stylesheet" href="/assets/css/academicons.min.css?f0b7046b84e425c55f3463ac249818f5"> <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Roboto+Slab:100,300,400,500,700|Material+Icons"> <link rel="stylesheet" href="/assets/css/jekyll-pygments-themes-github.css?19f3075a2d19613090fe9e16b564e1fe" media="" id="highlight_theme_light"> <link rel="shortcut icon" href="data:image/svg+xml,&lt;svg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20100%20100%22&gt;&lt;text%20y=%22.9em%22%20font-size=%2290%22&gt;%E2%9A%9B%EF%B8%8F&lt;/text&gt;&lt;/svg&gt;"> <link rel="stylesheet" href="/assets/css/main.css?d41d8cd98f00b204e9800998ecf8427e"> <link rel="canonical" href="https://maxiuw.github.io/barb/"> <link rel="stylesheet" href="/assets/css/jekyll-pygments-themes-native.css?e74e74bf055e5729d44a7d031a5ca6a5" media="none" id="highlight_theme_dark"> <script src="/assets/js/theme.js?96d6b3e1c3604aca8b6134c7afdd5db6"></script> <script src="/assets/js/dark_mode.js?9b17307bb950ffa2e34be0227f53558f"></script> </head> <body class="fixed-top-nav "> <header> <nav id="navbar" class="navbar navbar-light navbar-expand-sm fixed-top"> <div class="container"> <a class="navbar-brand title font-weight-lighter" href="/"><span class="font-weight-bold">Maciej </span>K. Wozniak</a> <button class="navbar-toggler collapsed ml-auto" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation"> <span class="sr-only">Toggle navigation</span> <span class="icon-bar top-bar"></span> <span class="icon-bar middle-bar"></span> <span class="icon-bar bottom-bar"></span> </button> <div class="collapse navbar-collapse text-right" id="navbarNav"> <ul class="navbar-nav ml-auto flex-nowrap"> <li class="nav-item "> <a class="nav-link" href="/">about</a> </li> <li class="nav-item "> <a class="nav-link" href="/publications/">publications</a> </li> <li class="nav-item "> <a class="nav-link" href="/cv/">cv</a> </li> <li class="toggle-container"> <button id="light-toggle" title="Change theme"> <i class="fa-solid fa-moon"></i> <i class="fa-solid fa-sun"></i> </button> </li> </ul> </div> </div> </nav> <progress id="progress" value="0"> <div class="progress-container"> <span class="progress-bar"></span> </div> </progress> </header> <div class="container mt-5"> <main role="main" class="page-content"> <div class="wrapper"> <script>window.BARB_SLIDES=[{image:"/assets/barb/ania.jpeg",text:"Dear Barb,\n\nWe\u2019re thinking of you in this challenging period and admire your resilience. Though there will be times when it is difficult to remain positive, remember the strength you have shown and how far you have already come. Although, sadly we cannot always be there in person, we are keeping you in our hearts and our prayers.\n\nSending lots of love and hope to see you soon!\nAnia & Paul"},{image:"/assets/barb/mama.jpeg",text:"Kochana Basiu\nPrzesy\u0142am Ci s\u0142owo zaczerpni\u0119te z Biblii, z Ksi\u0119gi Liczb (Lb 6, 25-26).\nTe \u017cyczenia zawieraj\u0105 to wszystko, co chcia\u0142bym Ci przekaza\u0107.\nS\u0142owa otuchy i pocieszenia, nadziei i wiary.\n\n\u201eNiech ci\u0119 Pan b\u0142ogos\u0142awi i strze\u017ce. Niech Pan rozpromieni oblicze swe nad tob\u0105.\nNiech ci\u0119 obdarzy sw\u0105 \u0142ask\u0105.\nNiech zwr\xf3ci ku tobie oblicze swoje i niech ci\u0119 obdarzy pokojem\u201d.\n\nBasiu pami\u0119tamy o Tobie, jeste\u015b w naszych sercach.\nPrzytulamy Ci\u0119 serdecznie \u2764\ufe0f\nMicha\u0142 i Alina"},{image:"/assets/barb/janek.jpg",text:"Dear Basia,\nI want to wish you a happy birthday. I hope that no matter how hard time you will have during your illness, you will have the strength and friends to overcome it. I wish you happiness and health \ud83d\ude4f\ud83c\udffd in the next years.\nI'm really glad that we are all in touch again.\nLove Janek"},{image:"/assets/barb/dorotka.jpeg",text:"\u017byczenia dla Basi\nDroga Basiu, bardzo nas zmartwi\u0142a wie\u015b\u0107 o Twojej ci\u0119\u017ckiej chorobie. Trudny to czas dla Ciebie. Walka z nowotworem jest pasmem strachu, b\xf3lu i niepewno\u015bci. Mamy jednak nadziej\u0119, \u017ce dasz rad\u0119 pokona\u0107 srogiego naje\u017ad\u017ac\u0119 i wygrasz z nim ostatecznie. Jeste\u015bmy z Tob\u0105. \u2764\ufe0f\u2764\ufe0f\u2764\ufe0f.\nSerdecznie pozdrawiamy\nDorota i Leszek"},{image:"/assets/barb/mateusz.jpg",text:"Dear Basia,\n\nI\u2019m really sorry to hear about your illness. I know this is a difficult time, but I believe you have incredible strength. I\u2019m hoping each day brings you as much peace, support, and good moments as possible.\n\nWishing you all the best,\nMateusz"},{image:"/assets/barb/babcia.jpeg",text:"Basie\u0144ko kochana,  wspominamy Tw\xf3j pobyt  w Polsce,  wsp\xf3lne \u015aWI\u0118TA---- z czu\u0142o\u015bci\u0105,  rado\u015bci\u0105  i z wielkim \u017calem,  \u017ce by\u0142o to jedyne spotkanie.  Jeste\u015b cz\u0142onkiem naszej RODZINY. Masz u nas wsparcie duchowe,  masz nasz\u0105 mi\u0142o\u015b\u0107,  \nz ca\u0142ego serce \u017cyczymy Ci zdrowia. Kochana,  my\u015blami jeste\u015bmy przy Tobie.\nOby by\u0142o nam dane sp\u0119dzi\u0107 razem jeszcze kolejne \u015aWI\u0118TA. \nTego Tobie i sobie \u017cyczymy. \nELA I Adek"},{image:"/assets/barb/photo06.jpg",text:"Dear Barb, \neach small step forward is a victory. You're stronger than you think and I know that the life doesn't always give us what we want but each challenge we overcome makes us who we are. \nI remember when the first time we met on christmas in Poland. You were so full of life and energy. Since then each visit in NYC was a blast and I chearished these moments we spent together.\nFamily is always there for you, when you're healthy and when you're not, you can depend on us! \nSending you love and a lot of positive energy.\nMaciej"},{image:"/assets/barb/photo07.jpg",text:"Healing isn\u2019t a race. You move at your own pace, and every moment of rest is part of your recovery."},{image:"/assets/barb/photo08.jpg",text:"You\u2019ve conquered mountains before, Barb \u2014 this time is no different. Your spirit is unbreakable."},{image:"/assets/barb/photo09.jpg",text:"Remember that healing also means being kind to yourself. You deserve patience, peace, and care."},{image:"/assets/barb/photo10.jpg",text:"Charlie is waiting for your next walk, tail wagging and heart full. You\u2019ll get there, step by step."},{image:"/assets/barb/photo11.jpg",text:"Each day is a new chance to move forward, to breathe deeper, to smile again."},{image:"/assets/barb/photo12.jpg",text:"Your body is learning to trust itself again, and your heart already knows how to keep fighting."},{image:"/assets/barb/photo13.jpg",text:"Barb, your courage is contagious. You inspire everyone who loves you."},{image:"/assets/barb/photo14.jpg",text:"Don\u2019t count the setbacks \u2014 count the days you kept going despite them."},{image:"/assets/barb/photo15.jpg",text:"Healing is not linear, but every smile, every step, every laugh counts."},{image:"/assets/barb/photo16.jpg",text:"You are not defined by what you can\u2019t do now, but by the strength that keeps you trying."},{image:"/assets/barb/photo17.jpg",text:"Every breath, every stretch, every gentle move is a reminder that your body still fights for you."},{image:"/assets/barb/photo18.jpg",text:"Rest is not weakness \u2014 it\u2019s part of the comeback. Give yourself permission to heal slowly."},{image:"/assets/barb/photo19.jpg",text:"One day soon, you\u2019ll be walking Charlie again with the same joy as before."},{image:"/assets/barb/photo20.jpg",text:"Barb, you have the heart of an athlete \u2014 determination, focus, and courage. Those traits are still yours."},{image:"/assets/barb/photo21.jpg",text:"Even when it feels like you\u2019re standing still, your body and mind are rebuilding."},{image:"/assets/barb/photo22.jpg",text:"Keep believing in your strength, Barb. You\u2019ve proven it countless times."},{image:"/assets/barb/photo23.jpg",text:"The world needs your energy, your laughter, your light. Keep shining \u2014 even softly."},{image:"/assets/barb/photo24.jpg",text:"Courage is waking up and choosing to try again. And you\u2019ve done that every day."},{image:"/assets/barb/photo25.jpg",text:"Every scar is proof of your survival, not your defeat."},{image:"/assets/barb/photo26.jpg",text:"You are loved more than you can imagine. That love carries you even on the hardest days."},{image:"/assets/barb/photo27.jpg",text:"Healing isn\u2019t just about walking again \u2014 it\u2019s about finding joy in small victories."},{image:"/assets/barb/photo28.jpg",text:"You\u2019ve always been stronger than you think, and braver than you know."},{image:"/assets/barb/photo29.jpg",text:"Charlie believes in you \u2014 and so does everyone else. You\u2019ll be out there again soon."},{image:"/assets/barb/photo30.jpg",text:"Your story is still being written, Barb. And it\u2019s one of resilience, love, and never giving up."}],window.BARB_AUTOPLAY_SECONDS=22;</script> <div id="barb-root" class="barb-wrapper" aria-live="polite" data-initialized="false"> <div class="barb-stage"> <img id="barb-image" alt="Family photo for Barb"> <div id="barb-caption" class="barb-caption"></div> </div> <div class="barb-controls"> <button id="barb-prev" type="button" aria-label="Previous">◀ Prev</button> <button id="barb-next" type="button" aria-label="Next">Next ▶</button> </div> </div> <style>.barb-wrapper{max-width:900px;margin:0 auto;padding:1rem}.barb-stage{position:relative;display:flex;flex-direction:column;align-items:center}.barb-stage img{max-width:100%;height:auto;display:block;margin:0 auto}.barb-caption{margin-top:.75rem;font-size:1.05rem;line-height:1.5;text-align:center;white-space:pre-wrap}.barb-controls{display:flex;justify-content:center;gap:1rem;margin-top:.5rem}.barb-controls button{padding:.4rem .8rem;cursor:pointer}</style> <script>!function(){function e(){function e(e){if(!c.length)return;const t=c[e]||{};t.image?l.src=t.image:l.removeAttribute("src"),l.alt=t.alt||"Family photo for Barb",s.textContent=t.text||""}function t(t){c.length&&(v=(t+c.length)%c.length,e(v),r())}function n(){t(v+1)}function d(){t(v-1)}function i(){g&&clearInterval(g),c.length>1&&u>0&&!document.hidden&&(g=setInterval(n,1e3*u))}function o(){g&&(clearInterval(g),g=null)}function r(){o(),i()}const a=document.getElementById("barb-root");if(!a||"true"===a.dataset.initialized)return;a.dataset.initialized="true";const c=Array.isArray(window.BARB_SLIDES)?window.BARB_SLIDES:[],u=Number(window.BARB_AUTOPLAY_SECONDS||12),l=document.getElementById("barb-image"),s=document.getElementById("barb-caption"),m=document.getElementById("barb-prev"),h=document.getElementById("barb-next");let v=0,g=null,
