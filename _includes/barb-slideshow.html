<!-- _includes/barb-slideshow.html -->
<div id="barb-root" class="barb-wrapper" aria-live="polite" data-initialized="false">
  <div class="barb-stage">
    <img id="barb-image" alt="Family photo for Barb" />
    <div id="barb-caption" class="barb-caption"></div>
  </div>
  <div class="barb-controls">
    <button id="barb-prev" type="button" aria-label="Previous">&#9664; Prev</button>
    <button id="barb-next" type="button" aria-label="Next">Next &#9654;</button>
  </div>
</div>

<style>
  .barb-wrapper { max-width: 900px; margin: 0 auto; padding: 1rem; }
  .barb-stage { position: relative; display: flex; flex-direction: column; align-items: center; }
  .barb-stage img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
  .barb-caption { margin-top: 0.75rem; font-size: 1.05rem; line-height: 1.5; text-align: center; white-space: pre-wrap; }
  .barb-controls { display: flex; justify-content: center; gap: 1rem; margin-top: 0.5rem; }
  .barb-controls button { padding: 0.4rem 0.8rem; cursor: pointer; }
</style>

<script>
(function () {
  function init() {
    const root = document.getElementById('barb-root');
    if (!root || root.dataset.initialized === 'true') return;
    root.dataset.initialized = 'true';

    const slides = Array.isArray(window.BARB_SLIDES) ? window.BARB_SLIDES : [];
    const intervalSec = Number(window.BARB_AUTOPLAY_SECONDS || 12);

    const imgEl = document.getElementById('barb-image');
    const capEl = document.getElementById('barb-caption');
    const prevBtn = document.getElementById('barb-prev');
    const nextBtn = document.getElementById('barb-next');

    let idx = 0; let timer = null; let touchStartX = null;

    function render(i) {
      if (!slides.length) return;
      const s = slides[i] || {};
      if (s.image) imgEl.src = s.image; else imgEl.removeAttribute('src');
      imgEl.alt = s.alt || 'Family photo for Barb';
      capEl.textContent = s.text || '';
    }

    function goTo(n) {
      if (!slides.length) return;
      idx = (n + slides.length) % slides.length;
      render(idx);
      restartAutoplay();
    }

    function next() { goTo(idx + 1); }
    function prev() { goTo(idx - 1); }

    function startAutoplay() {
      if (timer) clearInterval(timer);
      if (slides.length > 1 && intervalSec > 0 && !document.hidden) {
        timer = setInterval(next, intervalSec * 1000);
      }
    }

    function stopAutoplay() { if (timer) { clearInterval(timer); timer = null; } }
    function restartAutoplay() { stopAutoplay(); startAutoplay(); }

    // Click handlers (desktop & mobile)
    if (prevBtn) prevBtn.addEventListener('click', function (e) { e.preventDefault(); prev(); });
    if (nextBtn) nextBtn.addEventListener('click', function (e) { e.preventDefault(); next(); });

    // Keyboard arrows
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') next();
      else if (e.key === 'ArrowLeft') prev();
    });

    // Touch swipe (mobile)
    root.addEventListener('touchstart', (e) => {
      if (e.touches && e.touches.length) touchStartX = e.touches[0].clientX;
    }, { passive: true });
    root.addEventListener('touchend', (e) => {
      if (touchStartX == null) return;
      const dx = (e.changedTouches && e.changedTouches[0].clientX) - touchStartX;
      if (Math.abs(dx) > 40) { dx < 0 ? next() : prev(); }
      touchStartX = null;
    });

    // Pause on hover (desktop) & when tab not visible
    root.addEventListener('mouseenter', stopAutoplay);
    root.addEventListener('mouseleave', startAutoplay);
    document.addEventListener('visibilitychange', () => { if (document.hidden) stopAutoplay(); else startAutoplay(); });

    // Init
    if (slides.length) { render(0); startAutoplay(); }
  }

  // Support plain DOM, Turbolinks, bfcache
  document.addEventListener('DOMContentLoaded', init);
  document.addEventListener('turbolinks:load', init);
  window.addEventListener('pageshow', init);
})();
</script>
