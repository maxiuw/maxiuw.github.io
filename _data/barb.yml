slides:
  - image: "/assets/barb/ania.jpeg"
    text: |-
      Dear Barb,

      We’re thinking of you in this challenging period and admire your resilience. Though there will be times when it is difficult to remain positive, remember the strength you have shown and how far you have already come. Although, sadly we cannot always be there in person, we are keeping you in our hearts and our prayers.

      Sending lots of love and hope to see you soon!
      Ania & Paul
  - image: "/assets/barb/mama.jpeg"
    text: |-
      Kochana Basiu
      Przesyłam Ci słowo zaczerpnięte z Biblii, z Księgi Liczb (Lb 6, 25-26).
      Te życzenia zawierają to wszystko, co chciałbym Ci przekazać.
      Słowa otuchy i pocieszenia, nadziei i wiary.

      „Niech cię Pan błogosławi i strzeże. Niech Pan rozpromieni oblicze swe nad tobą.
      Niech cię obdarzy swą łaską.
      Niech zwróci ku tobie oblicze swoje i niech cię obdarzy pokojem”.

      Basiu pamiętamy o Tobie, jesteś w naszych sercach.
      Przytulamy Cię serdecznie ❤️
      Michał i Alina
  - image: "/assets/barb/jas.jpeg"
    text: |-
      Dear Basia,
      I want to wish you a happy birthday. I hope that no matter how hard time you will have during your illness, you will have the strength and friends to overcome it. I wish you happiness and health 🙏🏽 in the next years.
      I'm really glad that we are all in touch again.
      Love Janek
  - image: "/assets/barb/dorotka.jpeg"
    text: |-
      Życzenia dla Basi
      Droga Basiu, bardzo nas zmartwiła wieść o Twojej ciężkiej chorobie. Trudny to czas dla Ciebie. Walka z nowotworem jest pasmem strachu, bólu i niepewności. Mamy jednak nadzieję, że dasz radę pokonać srogiego najeźdźcę i wygrasz z nim ostatecznie. Jesteśmy z Tobą. ❤️❤️❤️.
      Serdecznie pozdrawiamy
      Dorota i Leszek
  - image: "/assets/barb/mateusz.jpg"
    text: |-
      Dear Basia,

      I’m really sorry to hear about your illness. I know this is a difficult time, but I believe you have incredible strength. I’m hoping each day brings you as much peace, support, and good moments as possible.

      Wishing you all the best,
      Mateusz
  - image: "/assets/barb/babcia.jpeg"
    text: |-
      Basieńko kochana,  wspominamy Twój pobyt  w Polsce,  wspólne ŚWIĘTA---- z czułością,  radością  i z wielkim żalem,  że było to jedyne spotkanie.  Jesteś członkiem naszej RODZINY. Masz u nas wsparcie duchowe,  masz naszą miłość,  
      z całego serce życzymy Ci zdrowia. Kochana,  myślami jesteśmy przy Tobie.
      Oby było nam dane spędzić razem jeszcze kolejne ŚWIĘTA. 
      Tego Tobie i sobie życzymy. 
      ELA I Adek