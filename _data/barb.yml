slides:
  - image: "/assets/barb/ania.jpeg"
    text: |-
      Dear Barb,

      We’re thinking of you in this challenging period and admire your resilience. Though there will be times when it is difficult to remain positive, remember the strength you have shown and how far you have already come. Although, sadly we cannot always be there in person, we are keeping you in our hearts and our prayers.

      Sending lots of love and hope to see you soon!
      Ania & Paul
  - image: "/assets/barb/mama.jpeg"
    text: |-
      Kochana Basiu
      Przesyłam Ci słowo zaczerpnięte z Biblii, z Księgi Liczb (Lb 6, 25-26).
      Te życzenia zawierają to wszystko, co chciałbym Ci przekazać.
      Słowa otuchy i pocieszenia, nadziei i wiary.

      „Niech cię Pan błogosławi i strzeże. Niech Pan rozpromieni oblicze swe nad tobą.
      Niech cię obdarzy swą łaską.
      Niech zwróci ku tobie oblicze swoje i niech cię obdarzy pokojem”.

      Basiu pamiętamy o Tobie, jesteś w naszych sercach.
      Przytulamy Cię serdecznie ❤️
      Michał i Alina
  - image: "/assets/barb/jas.jpeg"
    text: |-
      Dear Basia,
      I want to wish you a happy birthday. I hope that no matter how hard time you will have during your illness, you will have the strength and friends to overcome it. I wish you happiness and health 🙏🏽 in the next years.
      I'm really glad that we are all in touch again.
      Love Janek
  - image: "/assets/barb/dorotka.jpeg"
    text: |-
      Życzenia dla Basi
      Droga Basiu, bardzo nas zmartwiła wieść o Twojej ciężkiej chorobie. Trudny to czas dla Ciebie. Walka z nowotworem jest pasmem strachu, bólu i niepewności. Mamy jednak nadzieję, że dasz radę pokonać srogiego najeźdźcę i wygrasz z nim ostatecznie. Jesteśmy z Tobą. ❤️❤️❤️.
      Serdecznie pozdrawiamy
      Dorota i Leszek
  - image: "/assets/barb/mateusz.jpg"
    text: |-
      Dear Basia,

      I’m really sorry to hear about your illness. I know this is a difficult time, but I believe you have incredible strength. I’m hoping each day brings you as much peace, support, and good moments as possible.

      Wishing you all the best,
      Mateusz
  - image: "/assets/barb/babcia.jpeg"
    text: |-
      Basieńko kochana,  wspominamy Twój pobyt  w Polsce,  wspólne ŚWIĘTA---- z czułością,  radością  i z wielkim żalem,  że było to jedyne spotkanie.  Jesteś członkiem naszej RODZINY. Masz u nas wsparcie duchowe,  masz naszą miłość,  
      z całego serce życzymy Ci zdrowia. Kochana,  myślami jesteśmy przy Tobie.
      Oby było nam dane spędzić razem jeszcze kolejne ŚWIĘTA. 
      Tego Tobie i sobie życzymy. 
      ELA I Adek
  - image: "/assets/barb/photo06.jpg"
    text: |-
      Barb, each small step forward is a victory. Let every sunrise remind you that your strength grows with every new day.

  - image: "/assets/barb/photo07.jpg"
    text: |-
      Healing isn’t a race. You move at your own pace, and every moment of rest is part of your recovery.

  - image: "/assets/barb/photo08.jpg"
    text: |-
      You’ve conquered mountains before, Barb — this time is no different. Your spirit is unbreakable.

  - image: "/assets/barb/photo09.jpg"
    text: |-
      Remember that healing also means being kind to yourself. You deserve patience, peace, and care.

  - image: "/assets/barb/photo10.jpg"
    text: |-
      Charlie is waiting for your next walk, tail wagging and heart full. You’ll get there, step by step.

  - image: "/assets/barb/photo11.jpg"
    text: |-
      Each day is a new chance to move forward, to breathe deeper, to smile again.

  - image: "/assets/barb/photo12.jpg"
    text: |-
      Your body is learning to trust itself again, and your heart already knows how to keep fighting.

  - image: "/assets/barb/photo13.jpg"
    text: |-
      Barb, your courage is contagious. You inspire everyone who loves you.

  - image: "/assets/barb/photo14.jpg"
    text: |-
      Don’t count the setbacks — count the days you kept going despite them.

  - image: "/assets/barb/photo15.jpg"
    text: |-
      Healing is not linear, but every smile, every step, every laugh counts.

  - image: "/assets/barb/photo16.jpg"
    text: |-
      You are not defined by what you can’t do now, but by the strength that keeps you trying.

  - image: "/assets/barb/photo17.jpg"
    text: |-
      Every breath, every stretch, every gentle move is a reminder that your body still fights for you.

  - image: "/assets/barb/photo18.jpg"
    text: |-
      Rest is not weakness — it’s part of the comeback. Give yourself permission to heal slowly.

  - image: "/assets/barb/photo19.jpg"
    text: |-
      One day soon, you’ll be walking Charlie again with the same joy as before.

  - image: "/assets/barb/photo20.jpg"
    text: |-
      Barb, you have the heart of an athlete — determination, focus, and courage. Those traits are still yours.

  - image: "/assets/barb/photo21.jpg"
    text: |-
      Even when it feels like you’re standing still, your body and mind are rebuilding.

  - image: "/assets/barb/photo22.jpg"
    text: |-
      Keep believing in your strength, Barb. You’ve proven it countless times.

  - image: "/assets/barb/photo23.jpg"
    text: |-
      The world needs your energy, your laughter, your light. Keep shining — even softly.

  - image: "/assets/barb/photo24.jpg"
    text: |-
      Courage is waking up and choosing to try again. And you’ve done that every day.

  - image: "/assets/barb/photo25.jpg"
    text: |-
      Every scar is proof of your survival, not your defeat.

  - image: "/assets/barb/photo26.jpg"
    text: |-
      You are loved more than you can imagine. That love carries you even on the hardest days.

  - image: "/assets/barb/photo27.jpg"
    text: |-
      Healing isn’t just about walking again — it’s about finding joy in small victories.

  - image: "/assets/barb/photo28.jpg"
    text: |-
      You’ve always been stronger than you think, and braver than you know.

  - image: "/assets/barb/photo29.jpg"
    text: |-
      Charlie believes in you — and so does everyone else. You’ll be out there again soon.

  - image: "/assets/barb/photo30.jpg"
    text: |-
      Your story is still being written, Barb. And it’s one of resilience, love, and never giving up.